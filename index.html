<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Mario 3D</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; }

    /* ── UI Overlay Layer ── */
    #ui-root {
      position: fixed; inset: 0;
      pointer-events: none;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #fff;
      z-index: 10;
    }
    #ui-root > * { pointer-events: auto; }

    /* HUD */
    #hud {
      position: absolute; top: 16px; left: 16px;
      display: flex; gap: 24px;
      font-size: 18px; font-weight: 600;
      text-shadow: 0 2px 6px rgba(0,0,0,0.7);
    }

    /* Overlays */
    .overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(4px);
    }
    .overlay.hidden { display: none; }
    .overlay h1 {
      font-size: 56px; margin-bottom: 12px;
      text-shadow: 0 4px 20px rgba(0,0,0,0.8);
    }
    .overlay p {
      font-size: 22px; opacity: 0.85;
    }
    .overlay .sub { font-size: 16px; opacity: 0.6; margin-top: 8px; }

    /* Death overlay red tint */
    #overlay-dead { background: rgba(120, 10, 10, 0.6); }

    /* Win overlay green tint */
    #overlay-won { background: rgba(10, 80, 30, 0.6); }
  </style>
</head>
<body>
  <div id="ui-root">
    <!-- HUD -->
    <div id="hud" class="hidden">
      <span id="hud-timer">Time: 0.0s</span>
      <span id="hud-deaths">Deaths: 0</span>
      <span id="hud-coins">Coins: 0</span>
    </div>

    <!-- Start Screen -->
    <div id="overlay-start" class="overlay">
      <h1>Mini Mario 3D</h1>
      <p>Press ENTER to Start</p>
      <p class="sub">WASD / Arrows to move &bull; Space to jump &bull; Shift to run</p>
    </div>

    <!-- Pause -->
    <div id="overlay-pause" class="overlay hidden">
      <h1>Paused</h1>
      <p>Press ESC to Resume</p>
    </div>

    <!-- Dead -->
    <div id="overlay-dead" class="overlay hidden">
      <h1>YOU DIED</h1>
      <p>Press R to Restart</p>
    </div>

    <!-- Won -->
    <div id="overlay-won" class="overlay hidden">
      <h1>LEVEL COMPLETE!</h1>
      <p id="won-time">Time: 0.0s</p>
      <p class="sub">Press R to Restart</p>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
